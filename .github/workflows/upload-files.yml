name: Upload files

on:
  push:
    branches:
      - NS
  workflow_dispatch:

jobs:
  upload:
    name: Test FTP and upload files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Test FTP connection
        env:
          FTP_URL: ${{ vars.FTP_URL }}
          FTP_USER: ${{ vars.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_TARGET_DIR: ${{ vars.FTP_TARGET_DIR || './' }}
        run: bash cicd/test-ftp-connection.sh

      - name: Upload files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ vars.FTP_URL }}
          username: ${{ vars.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: ${{ vars.FTP_TARGET_DIR || './' }}
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/cicd/**
            **/docs/**
            README.md
            README_NS.md
            .gitignore
            .gitattributes
