name: Upload files

on:
  push:
    branches:
      - NS
      - MH
  workflow_dispatch:

jobs:
  upload:
    name: Test FTP and upload files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Test FTP connection
        env:
          FTP_URL: ${{ vars.FTP_URL }}
          FTP_USER: ${{ vars.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_TARGET_DIR: ${{ vars.FTP_TARGET_DIR || './' }}
        run: bash cicd/test-ftp-connection.sh

      - name: Install deployment tools
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp php-cli

      - name: Lint PHP files
        run: find web cicd -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Build database config
        env:
          DB_HOST: ${{ vars.DB_HOST || 'localhost' }}
          DB_DB: ${{ vars.DB_DB }}
          DB_USER: ${{ vars.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          APP_BRANCH: ${{ github.ref_name }}
        run: php cicd/build-config.php

      - name: Upload files
        env:
          FTP_URL: ${{ vars.FTP_URL }}
          FTP_USER: ${{ vars.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_TARGET_DIR: ${{ vars.FTP_TARGET_DIR || './' }}
        run: bash cicd/deploy-ftp.sh
